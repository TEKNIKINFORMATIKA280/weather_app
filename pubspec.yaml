name: weather_app
description: "Aplikasi cuaca Flutter modern dengan desain Glassmorphism, animasi Lottie, dan data cuaca real-time."
publish_to: 'none'

version: 3.0.0+1

environment:
  sdk: ^3.5.0 # Diubah dari ^3.12.0 agar kompatibel dengan Flutter 3.24.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  intl: any
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  shared_preferences: ^2.2.2
  flutter_spinkit: ^5.2.1
  flutter_local_notifications: ^17.2.2
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
